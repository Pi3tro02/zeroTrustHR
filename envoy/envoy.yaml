################################################################################
#  envoy/envoy.yaml — versione aggiornata
#
#  Modifiche rispetto all'originale:
#    1. Aggiunto blocco access_log con formato JSON su stdout
#       → Docker cattura i log → backend/logService li forwarda a Splunk HEC
#    2. Timeout ext_authz alzato da 2s a 5s (più robusto in sviluppo)
#    3. Aggiunto header x-forwarded-for nella route per tracciabilità IP
#    4. Commenti esplicativi su ogni sezione
#
#  Per abilitare mTLS (futuro):
#    → aggiungere transport_socket con DownstreamTlsContext nel listener
#    → aggiungere upstream TLS verso backend se necessario
################################################################################

static_resources:
  listeners:
    - name: listener_http
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10000
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http

                # ── Access Log JSON su stdout ─────────────────────────────────
                # Docker cattura questo output con `docker logs zerotrust-envoy`.
                # Ogni riga è un JSON con i campi utili per Splunk BARAC:
                #   - chi ha fatto la richiesta (x_user, x_role)
                #   - cosa ha richiesto (path, x_resource)
                #   - esito OPA (response_code: 403 = denied, 200 = allowed)
                #   - metriche (duration_ms, bytes_sent)
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        json_format:
                          # ── Metadati temporali ──
                          timestamp:        "%START_TIME%"
                          source:           "envoy"
                          # ── Identità (letti dagli header client) ──
                          x_user:           "%REQ(x-user)%"
                          x_role:           "%REQ(x-role)%"
                          x_department:     "%REQ(x-department)%"
                          x_resource_name:  "%REQ(x-resource-name)%"
                          x_action:         "%REQ(x-action)%"
                          x_risk_score:     "%REQ(x-risk-score)%"
                          x_mfa_enabled:    "%REQ(x-mfa-enabled)%"
                          x_device_trusted: "%REQ(x-device-trusted)%"
                          x_ja3:            "%REQ(x-ja3)%"
                          x_device_ip:      "%REQ(x-device-ip)%"
                          # ── Rete ──
                          client_ip:        "%DOWNSTREAM_REMOTE_ADDRESS_WITHOUT_PORT%"
                          forwarded_for:    "%REQ(x-forwarded-for)%"
                          # ── Richiesta HTTP ──
                          method:           "%REQ(:METHOD)%"
                          path:             "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
                          protocol:         "%PROTOCOL%"
                          # ── Risposta ──
                          response_code:    "%RESPONSE_CODE%"
                          # outcome: 200/2xx = OPA allowed, 403 = OPA denied
                          outcome:          "%RESPONSE_CODE_DETAILS%"
                          duration_ms:      "%DURATION%"
                          bytes_received:   "%BYTES_RECEIVED%"
                          bytes_sent:       "%BYTES_SENT%"
                          upstream_host:    "%UPSTREAM_HOST%"
                          upstream_cluster: "%UPSTREAM_CLUSTER%"

                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend_service
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: backend_service
                          # Aggiunge x-forwarded-for con IP del client
                          request_headers_to_add:
                            - header:
                                key: x-forwarded-for
                                value: "%DOWNSTREAM_REMOTE_ADDRESS_WITHOUT_PORT%"
                              keep_empty_value: false

                http_filters:
                  # ── OPA ext_authz — Policy Decision Point ───────────────────
                  # Ogni richiesta viene valutata da OPA prima di essere
                  # inoltrata al backend. Se OPA risponde deny → 403 al client.
                  - name: envoy.filters.http.ext_authz
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                      transport_api_version: V3
                      grpc_service:
                        envoy_grpc:
                          cluster_name: opa_ext_authz
                        timeout: 5s          # alzato da 2s per robustezza in sviluppo
                      failure_mode_allow: false   # se OPA è down → deny (fail-closed)
                      # Passa tutti gli header HTTP originali a OPA
                      # (necessario per x-user, x-role, x-risk-score, ecc.)
                      with_request_body:
                        max_request_bytes: 8192
                        allow_partial_message: true

                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    # ── Backend Node.js ───────────────────────────────────────────────────────
    - name: backend_service
      type: STRICT_DNS
      connect_timeout: 2s
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: backend_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: backend
                      port_value: 3000

    # ── OPA gRPC ext_authz — PDP ──────────────────────────────────────────────
    - name: opa_ext_authz
      type: STRICT_DNS
      connect_timeout: 2s
      http2_protocol_options: {}   # gRPC richiede HTTP/2
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: opa_ext_authz
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: opa
                      port_value: 9191

# ── Admin API (non esporre in produzione) ─────────────────────────────────────
admin:
  access_log_path: /tmp/admin_access.log
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901
