################################################################################
#  ZeroTrustHR — docker-compose.yml
#
#  Modifiche rispetto alla versione originale:
#    1. Aggiunto servizio Splunk con HEC abilitato
#    2. Autenticazione MongoDB (MONGO_INITDB_ROOT_*)
#    3. Rete Docker dedicata (zerotrust_net) per isolare i servizi
#    4. Health checks su mongodb, opa e splunk
#    5. Volume persistente per /opt/splunk/etc e /opt/splunk/var
#    6. Variabili sensibili lette da .env (NON commitare .env in git!)
################################################################################

services:

  # ─── Data Tier ───────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: zerotrust-mongodb
    restart: unless-stopped
    expose:
      - "27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD obbligatorio}
      MONGO_INITDB_DATABASE: zerotrusthr
    depends_on:
      splunk:
        condition: service_healthy
    volumes:
      - mongo_data:/data/db
    networks:
      - zerotrust_net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: splunk
      options:
        splunk-url: "https://host.docker.internal:8088" # Usa lo stesso URL che ha funzionato per gli altri
        splunk-token: "${SPLUNK_HEC_TOKEN}"
        splunk-insecureskipverify: "true"
        splunk-format: "json"
        splunk-sourcetype: "mongodb_json"
        tag: "docker-{{.Name}}"

  # ─── Backend (Node.js / TypeScript) ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: zerotrust-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      # URI con autenticazione MongoDB
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD}@mongodb:27017/zerotrusthr?authSource=admin
      DB_NAME: zerotrusthr
      # Splunk HEC — usato da logService per inviare audit log
      SPLUNK_HEC_URL: https://splunk:8088/services/collector/event
      SPLUNK_HEC_TOKEN: ${SPLUNK_HEC_TOKEN:?SPLUNK_HEC_TOKEN obbligatorio}
      # OPA — usato da splunkWebhook per aggiornare la blocklist
      OPA_URL: http://opa:8181
      # Secret per autenticare webhook da Splunk (verificato in splunkWebhookController)
      SPLUNK_WEBHOOK_SECRET: ${SPLUNK_WEBHOOK_SECRET:?SPLUNK_WEBHOOK_SECRET obbligatorio}
      # JWT — usato per autenticare le richieste interne (es. health check di Envoy)
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET obbligatorio}
      # Disabilita verifica certificato self-signed Splunk
      NODE_TLS_REJECT_UNAUTHORIZED: "0"

      SPLUNK_BASE_URL: ${SPLUNK_BASE_URL}
      SPLUNK_USERNAME: ${SPLUNK_USERNAME}
      SPLUNK_PASSWORD: ${SPLUNK_PASSWORD}
      SPLUNK_WINDOW: ${SPLUNK_WINDOW}
      SPLUNK_SEARCH_OWNER: ${SPLUNK_SEARCH_OWNER}
      SPLUNK_SEARCH_APP: ${SPLUNK_SEARCH_APP}

    depends_on:
      mongodb:
        condition: service_started
      opa:
        condition: service_started
      splunk:
        condition: service_healthy
    networks:
      - zerotrust_net
    logging:
      driver: splunk
      options:
        splunk-url: "https://host.docker.internal:8088" # Usa localhost se il comando docker-compose gira sull'host, o l'IP di Splunk
        splunk-token: "${SPLUNK_HEC_TOKEN}"
        splunk-insecureskipverify: "true"
        splunk-format: "json" # Fondamentale per dire a Splunk che il payload è JSON
        splunk-sourcetype: "backend_node_pino" # Sourcetype di default se non specificato
        tag: "docker-{{.Name}}" # Aiuta a distinguere da quale container arriva

  # ─── PDP — OPA ───────────────────────────────────────────────────────────────
  opa:
    image: openpolicyagent/opa:1.3.0-envoy-5-static
    container_name: zerotrust-opa
    restart: unless-stopped
    expose:
      - "8181"
      - "9191"
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--config-file=/app/config/opa_config.yaml"
      - "--watch"
      - "/app/data"
      - "/app/policies"
    volumes:
      - ./opa/config:/app/config:ro
      - ./opa/data:/app/data:ro
      - ./opa/policies:/app/policies:ro
      - ./test-input.json:/app/test-input.json:ro
    networks:
      - zerotrust_net
    healthcheck:
      test: ["CMD", "/opa", "eval", "true"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    depends_on:
      splunk:
        condition: service_healthy
    logging:
      driver: splunk
      options:
        splunk-url: "https://host.docker.internal:8088"
        splunk-token: "${SPLUNK_HEC_TOKEN}"
        splunk-insecureskipverify: "true"
        splunk-format: "json"
        splunk-sourcetype: "opa_decision"
        tag: "docker-{{.Name}}"

  # ─── PEP — Envoy Proxy ───────────────────────────────────────────────────────
  envoy:
    image: envoyproxy/envoy:v1.31-latest
    container_name: zerotrust-envoy
    restart: unless-stopped
    ports:
      - "10000:10000"
      - "9901:9901"
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./envoy/certs:/etc/envoy/certs:ro
    depends_on:
      backend:
        condition: service_started
      opa:
        condition: service_started
      splunk:
        condition: service_healthy
    networks:
      - zerotrust_net
    logging:
      driver: splunk
      options:
        splunk-url: "https://host.docker.internal:8088"
        splunk-token: "${SPLUNK_HEC_TOKEN}"
        splunk-insecureskipverify: "true"
        splunk-format: "json"
        splunk-sourcetype: "envoy_access"
        tag: "docker-{{.Name}}"

  # ─── SIEM — Splunk (PDP / Motore di Rischio BARAC) ───────────────────────────
  splunk:
    image: splunk/splunk:latest
    platform: linux/amd64
    container_name: zerotrust-splunk
    restart: unless-stopped
    ports:
      - "8000:8000"   # Web UI
      - "8088:8088"   # HTTP Event Collector (HEC)
      - "8089:8089"   # REST API / management
    environment:
      SPLUNK_START_ARGS: "--accept-license"
      SPLUNK_GENERAL_TERMS: "--accept-sgt-current-at-splunk-com"
      SPLUNK_PASSWORD: ${SPLUNK_PASSWORD:?SPLUNK_PASSWORD obbligatorio}
      # Pre-installa l'app zerotrust montata da volume
      #SPLUNK_APPS_URL: /opt/splunk-apps
      # HEC abilitato — il token viene creato da inputs.conf
      SPLUNK_HEC_TOKEN: ${SPLUNK_HEC_TOKEN}
    volumes:
      # App personalizzata con inputs.conf, savedsearches.conf, lookups
      - ./splunk/apps/zerotrust_app:/opt/splunk/etc/apps/zerotrust_app
      # Persistenza dati e indici
      - splunk_var:/opt/splunk/var
      #- splunk_etc:/opt/splunk/etc
      - ./snort/logs:/opt/splunk/var/log/snort
    networks:
      - zerotrust_net
    healthcheck:
      # Usiamo -k perché il certificato HTTPS di Splunk è self-signed.
      # Interroghiamo direttamente l'endpoint di salute dell'HEC sulla porta 8088.
      test: ["CMD-SHELL", "curl -ksf https://localhost:8088/services/collector/health/1.0 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 340s   # Splunk impiega ~60s ad avviarsi

  # ─── IDS — Snort ─────────────────────────────────────────────────────────────
  snort:
    image: ciscotalos/snort3:latest
    container_name: zerotrust-snort
    restart: "no"

    user: root

    # Snort deve poter osservare il traffico di rete
    network_mode: "service:envoy"

    cap_add:
      - NET_ADMIN
      - NET_RAW

    volumes:
      - ./snort/snort.lua:/etc/snort/snort.lua:ro
      - ./snort/rules:/etc/snort/rules:ro
      - ./snort/logs:/var/log/snort
    
    depends_on:
      envoy:
        condition: service_started

    entrypoint: ["/home/snorty/snort3/bin/snort"]

    #command: "-c /etc/snort/snort.lua -i eth0 -A alert_fast -l /var/log/snort -k none"
    command: "-c /etc/snort/snort.lua -i eth0 -A alert_json -l /var/log/snort -k none"

# ─── Firewall — nftables (L3/L4) ────────────────────────────────────────────
  nftables:
    build:
      context: ./nftables
      dockerfile: Dockerfile
    container_name: zerotrust-nftables
    # In Docker Desktop, network_mode: host si attacca alla VM WSL2.
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: "no"
    depends_on:                          
      splunk:                             
        condition: service_healthy
    # Aggiungi il blocco logging per inviare i dati a Splunk!
    logging:
      driver: splunk
      options:
        splunk-url: "https://host.docker.internal:8088" # host.docker.internal è un trucco per raggiungere Splunk su Windows
        splunk-token: "${SPLUNK_HEC_TOKEN}"
        splunk-insecureskipverify: "true"
        splunk-format: "json"
        splunk-sourcetype: "nftables_json"

# ─── Reti ────────────────────────────────────────────────────────────────────
networks:
  zerotrust_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

# ─── Volumi ──────────────────────────────────────────────────────────────────
volumes:
  mongo_data:
  splunk_var:
  #splunk_etc:
