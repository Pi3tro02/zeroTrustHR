################################################################################
#  zerotrust_app/default/inputs.conf
#
#  Configura l'HTTP Event Collector (HEC) di Splunk.
#  Splunk accetta log JSON in push sulla porta 8088.
#
#  Sorgenti attese:
#    - OPA  : Decision logs (JSON) → sourcetype=opa_decision
#    - Backend Node.js : Audit logs (JSON) → sourcetype=backend_audit
#    - Envoy : Access logs (JSON) → sourcetype=envoy_access
################################################################################

# ─── Abilitazione globale HEC ────────────────────────────────────────────────
[http]
disabled = 0
port     = 8088
# In produzione usare TLS:
enableSSL = 1
# sslCert   = /opt/splunk/etc/auth/server.pem
# sslPassword = <password>

# ─── Token HEC per ZeroTrustHR ───────────────────────────────────────────────
# Il valore del token deve corrispondere a SPLUNK_HEC_TOKEN nel .env
# Creato automaticamente da Splunk al primo avvio se non esiste.
[http://splunk_hec_token]
disabled = 0
token = a1b2c3d4-e5f6-7890-abcd-ef1234567890
index = zerotrust
indexes = zerotrust
sourcetype = _json
useDeploymentServer = 0

# ─── Token dedicato per OPA Decision Logs ────────────────────────────────────
# OPA invia i decision log come array JSON con "type": "decision"
[http://opa_decision_logs]
disabled       = 0
token          = b2c3d4e5-f6a1-8901-bcde-f12345678901
index          = zerotrust
sourcetype     = opa_decision

# ─── Monitoraggio Log di Snort (Lettura da File) ─────────────────────────────
# Snort scrive gli allarmi in formato JSON in /var/log/snort/alert_json.txt
# La cartella è condivisa con Splunk tramite volume Docker.
[monitor:///opt/splunk/var/log/snort/alert_json.txt]
disabled = 0
index = zerotrust
sourcetype = _json
# Usiamo _json così Splunk estrae automaticamente tutti i campi dell'allarme


# ─── Indice zerotrust (creato a runtime se non esiste) ───────────────────────
# Nota: la definizione formale dell'indice va in indexes.conf.
# Per semplicità in sviluppo Splunk crea l'indice automaticamente.
───────────
