################################################################################
#  zerotrust_app/default/savedsearches.conf
#
#  Contiene:
#    1. BARAC_RiskProfit_RealTime  — finestra rt-5m, calcola Profitto = Beneficio - Rischio
#    2. BARAC_BlockUser_Webhook    — alert che scatta se Profitto < 0 e chiama il backend
#    3. BARAC_Dashboard_Summary    — ricerca schedulata per la dashboard (ogni 5 min)
#
#  Modello BARAC:
#    risk_penalty  = deny_count * risk_multiplier
#    total_benefit = allow_count * benefit_score
#    profit        = total_benefit - risk_penalty
#    → se profit < 0  ⟹  blocca utente (Risk-Cover violata)
################################################################################

# ─────────────────────────────────────────────────────────────────────────────
# 1. RICERCA REAL-TIME: calcolo profitto BARAC (finestra mobile 5 minuti)
# ─────────────────────────────────────────────────────────────────────────────
[BARAC_RiskProfit_RealTime]
disabled        = 0
search          = index=zerotrust earliest=rt-5m latest=rt \
    | eval resource_name=coalesce('result.resource', 'resource', 'input.resource_name', 'unknown') \
    | eval outcome=coalesce('result.decision', 'outcome', 'unknown') \
    | eval username=coalesce('result.user', 'username', 'input.user', 'unknown') \
    | eval action=coalesce('result.action', 'action', 'unknown') \
    | lookup asset_weights.csv resource_name OUTPUT risk_multiplier benefit_score sensitivity \
    | eval risk_multiplier=coalesce(risk_multiplier, 1.0) \
    | eval benefit_score=coalesce(benefit_score, 1.0) \
    | eval is_deny=if(match(lower(outcome),"deny|false|denied|failure"), 1, 0) \
    | eval is_allow=if(match(lower(outcome),"allow|true|allowed|success"), 1, 0) \
    | eval risk_penalty=is_deny * risk_multiplier \
    | eval benefit_gained=is_allow * benefit_score \
    | stats \
        sum(risk_penalty)  AS total_risk \
        sum(benefit_gained) AS total_benefit \
        count(eval(is_deny=1))  AS deny_count \
        count(eval(is_allow=1)) AS allow_count \
        values(action)     AS actions \
        values(sensitivity) AS resources_touched \
        BY username \
    | eval profit=total_benefit - total_risk \
    | eval risk_cover=if(profit >= 0, "OK", "VIOLATED") \
    | eval severity=case( \
        profit >= 10,   "safe", \
        profit >= 0,    "warning", \
        profit >= -10,  "danger", \
        true(),         "critical" \
    ) \
    | eval evaluated_at=now() \
    | fields username, profit, total_risk, total_benefit, \
             deny_count, allow_count, risk_cover, severity, \
             actions, resources_touched, evaluated_at
description     = Calcolo real-time del profitto di sicurezza BARAC per utente (finestra 5 min). \
                  Se profit < 0 la proprieta Risk-Cover e violata e l utente va bloccato.
is_scheduled    = 0
realtime_schedule = 1

# ─────────────────────────────────────────────────────────────────────────────
# 2. ALERT + WEBHOOK: blocca utente quando profit < 0
# ─────────────────────────────────────────────────────────────────────────────
[BARAC_BlockUser_Webhook]
disabled        = 0
search          = index=zerotrust earliest=rt-5m latest=rt \
    | eval resource_name=coalesce('result.resource', 'resource_id', 'details.resource_name', 'resource', 'input.resource_name', 'unknown') \
    | eval outcome=coalesce('result.decision', 'outcome', 'unknown') \
    | eval username=coalesce('result.user', 'username', 'input.user', 'unknown') \
    | lookup asset_weights.csv resource_name OUTPUT risk_multiplier benefit_score \
    | eval risk_multiplier=coalesce(risk_multiplier, 1.0) \
    | eval benefit_score=coalesce(benefit_score, 1.0) \
    | eval is_deny=if(match(lower(outcome),"deny|false|denied|failure"), 1, 0) \
    | eval is_allow=if(match(lower(outcome),"allow|true|allowed|success"), 1, 0) \
    | eval risk_penalty=is_deny * risk_multiplier \
    | eval benefit_gained=is_allow * benefit_score \
    | stats \
        sum(risk_penalty)   AS total_risk \
        sum(benefit_gained) AS total_benefit \
        count(eval(is_deny=1))  AS deny_count \
        BY username \
    | eval profit=total_benefit - total_risk \
    | where profit < 0 AND username != "unknown" \
    | eval block_reason="BARAC_profit_negative" \
    | eval blocked_at=strftime(now(), "%Y-%m-%dT%H:%M:%SZ") \
    | fields username, profit, total_risk, total_benefit, deny_count, block_reason, blocked_at
description     = Alert real-time: se un utente ha profitto BARAC < 0 invia un webhook al backend \
                  per aggiornare la blocklist OPA e bloccare immediatamente le nuove richieste.
is_scheduled    = 1
realtime_schedule = 1
# ── Condizione di trigger ──────────────────────────────────────────────────
alert_type      = number of events
alert_comparator = greater than
alert_threshold = 0
alert_condition =
# ── Soppressione: non ripetere lo stesso blocco per 5 minuti ──────────────
alert.suppress              = 1
alert.suppress.period       = 5m
alert.suppress.fields       = username
# ── Azione: Webhook HTTP POST verso il backend Node.js ───────────────────
# Il backend riceve il payload e chiama OPA /v1/data/authz/blocklist (PATCH)
action.webhook              = 1
action.webhook.param.url    = http://backend:3000/api/splunk-webhook
# Payload JSON inviato al backend — usa i campi del risultato SPL
action.webhook.param.payload = { \
    "action": "block_user", \
    "username": "$result.username$", \
    "profit": $result.profit$, \
    "total_risk": $result.total_risk$, \
    "total_benefit": $result.total_benefit$, \
    "deny_count": $result.deny_count$, \
    "block_reason": "$result.block_reason$", \
    "blocked_at": "$result.blocked_at$", \
    "source": "splunk_barac" \
}
# Autenticazione: Splunk aggiunge un header custom al webhook
# Configurare nel backend con SPLUNK_WEBHOOK_SECRET
action.webhook.param.headers = {"X-Splunk-Webhook-Secret": "dev_webhook_secret_zerotrust_2026"}

# ─────────────────────────────────────────────────────────────────────────────
# 3. RICERCA SCHEDULATA: summary dashboard (ogni 5 min, ultimi 30 min)
# ─────────────────────────────────────────────────────────────────────────────
[BARAC_Dashboard_Summary]
disabled        = 0
search          = index=zerotrust earliest=-30m latest=now \
    | eval resource_name=coalesce('result.resource', 'resource_id', 'details.resource_name', 'resource', 'input.resource_name', 'unknown') \
    | eval outcome=coalesce('result.decision', 'outcome', 'unknown') \
    | eval username=coalesce('result.user', 'username', 'input.user', 'unknown') \
    | lookup asset_weights.csv resource_name OUTPUT risk_multiplier benefit_score sensitivity \
    | eval risk_multiplier=coalesce(risk_multiplier, 1.0) \
    | eval benefit_score=coalesce(benefit_score, 1.0) \
    | eval is_deny=if(match(lower(outcome),"deny|false|denied|failure"), 1, 0) \
    | eval is_allow=if(match(lower(outcome),"allow|true|allowed|success"), 1, 0) \
    | stats \
        sum(eval(is_deny * risk_multiplier))   AS total_risk \
        sum(eval(is_allow * benefit_score))    AS total_benefit \
        count(eval(is_deny=1))  AS deny_count \
        count(eval(is_allow=1)) AS allow_count \
        dc(resource_name)       AS unique_resources \
        BY username \
    | eval profit=total_benefit - total_risk \
    | eval risk_cover=if(profit >= 0, "OK", "VIOLATED") \
    | sort - deny_count \
    | head 50
description     = Summary schedulato (ogni 5 min) del profitto BARAC per tutti gli utenti. \
                  Usato come datasource per la dashboard ZeroTrustHR.
is_scheduled    = 1
cron_schedule   = */5 * * * *
dispatch.earliest_time = -30m
dispatch.latest_time   = now
enableSched     = 1

# ─────────────────────────────────────────────────────────────────────────────
# 4. RICERCA: top risorse a rischio (ultimi 60 min)
# ─────────────────────────────────────────────────────────────────────────────
[BARAC_TopRiskyResources]
disabled        = 0
search          = index=zerotrust earliest=-60m latest=now \
    | eval resource_name=coalesce('result.resource', 'resource', 'input.resource_name', 'unknown') \
    | eval outcome=coalesce('result.decision', 'outcome', 'unknown') \
    | lookup asset_weights.csv resource_name OUTPUT risk_multiplier sensitivity \
    | eval is_deny=if(match(lower(outcome),"deny|false|denied|failure"), 1, 0) \
    | eval risk_contribution=is_deny * coalesce(risk_multiplier, 1.0) \
    | stats \
        sum(risk_contribution) AS total_risk \
        count(eval(is_deny=1)) AS deny_count \
        dc(username)           AS affected_users \
        first(sensitivity)     AS sensitivity \
        BY resource_name \
    | sort - total_risk \
    | head 10
description     = Top 10 risorse con maggiore contributo al rischio nelle ultime 60 min.
is_scheduled    = 1
cron_schedule   = */10 * * * *
dispatch.earliest_time = -60m
dispatch.latest_time   = now
enableSched     = 1
