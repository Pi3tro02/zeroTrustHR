################################################################################
#  zerotrust_app/default/transforms.conf
#
#  Definisce il lookup automatico per asset_weights.csv.
#  Splunk usa questo file per collegare le savedsearches al CSV.
################################################################################

[asset_weights]
filename      = asset_weights.csv
default_match = false
# Abilita lookup case-insensitive sul campo resource_name
case_sensitive_match = false
