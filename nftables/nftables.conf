flush ruleset

table inet filter {
  chain input {
    type filter hook input priority 0;

    # traffico già stabilito
    ct state established,related accept

    # loopback
    iif lo accept

    # SSH (NON BLOCCARTI FUORI)
    tcp dport 22 accept

    # ─── ENTRYPOINT ZERO TRUST ───
    # Envoy mTLS
    tcp dport 10000 accept

    # ─── DEBUG / OPS ───
    tcp dport 9901 accept     # Envoy admin
    tcp dport 8000 accept     # Splunk UI
    tcp dport 8088 accept     # Splunk HEC
    tcp dport 8089 accept     # Splunk API

    # ─── DEV ONLY (opzionale) ───
    tcp dport 3000 accept     # backend (meglio rimuoverlo in prod)
    tcp dport 27017 accept    # Mongo (meglio rimuoverlo in prod)
    tcp dport 8181 accept     # OPA API
    tcp dport 9191 accept     # OPA Envoy plugin

    # blocca tutto il resto
    drop
  }
}