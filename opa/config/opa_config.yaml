# OPA Server Configuration — zeroTrustHR
#
# Avvio locale (bundle da filesystem):
#   opa run --server \
#       --config-file opa/config/opa_config.yaml \
#       --bundle opa/policies \
#       --watch
#
# Test policies:
#   opa test opa/policies opa/tests -v \
#       --data opa/data/roles.json \
#       --data opa/data/resources.json
#
# Query manuale (allowed_request):
#   opa eval --data opa/data/roles.json --data opa/data/resources.json \
#       --bundle opa/policies \
#       --input opa/input/allowed_request.json \
#       "data.authz.response"

# NOTA sul formato HEC:
#   OPA invia { "decision_id": "...", "input": {...}, "result": {...} }
#   Splunk HEC si aspetta { "event": {...} }
#   → La soluzione più pratica per il progetto è console: true
#     e leggere i log OPA con il backend o un forwarder.
#   → Per l'invio diretto a HEC decommentare `service: splunk_hec`
#     solo se si usa un OPA bundle con custom plugin wrapper.


server:
  addrs:
    - "0.0.0.0:8181"


# ── Servizio Splunk HEC ───────────────────────────────────────────────────────
services:
  splunk_hec:
    url: http://splunk:8088/services/collector/event
    headers:
      Authorization: "Splunk ${SPLUNK_OPA_TOKEN}"
      Content-Type: "application/json"

# Decision log: emesso su console (in produzione: inviare a Splunk/SIEM)
decision_logs:
  console: true   # Scrive JSON strutturato su stdout (Docker logs)
  # service: splunk_hec  # Decommentare solo con custom HEC wrapper plugin

# Status log: utile per monitorare il bundle load
status:
  console: true

# Logging strutturato JSON per integrazione con ELK/Splunk
log:
  level: info
  format: json-pretty

# Plugin Envoy per ext_authz gRPC (OPA as sidecar)
# Il path "authz/response" espone il documento response di access.rego
plugins:
  envoy_ext_authz_grpc:
    addr: "0.0.0.0:9191"
    path: authz/response
    dry-run: false
    enable-reflection: false

